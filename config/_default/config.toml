# Change baseurl before deploy   Hugo Theme Stack Starter
baseurl = "https://wxyClark.github.io"
languageCode = "zh-cn"
title = "wxyClark's Knowledge Base"
theme = "stack"
[author]
  name = "wxyClark"
  email = "Cxxxxxxxxx@outlook.com"
[params.social]
  GitHub = "wxyClark"
  Zhihu = "王谢堂主"

[[menu.main]]
  identifier = "posts"
  name = "文章"
  url = "/posts/"
  weight = 1  # 控制排序，值越小越靠前
[[menu.main]]
  identifier = "tags"
  name = "标签"
  url = "/tags/"
  weight = 2

# Theme i18n support
# Available values: en, fr, id, ja, ko, pt-br, zh-cn, zh-tw, es, de, nl, it, th, el, uk, ar
defaultContentLanguage = "zh-cn"

# Set hasCJKLanguage to true if DefaultContentLanguage is in [zh-cn ja ko]
# This will make .Summary and .WordCount behave correctly for CJK languages.
hasCJKLanguage = false

# Change it to your Disqus shortname before using
disqusShortname = "hugo-theme-stack"

[pagination]
pagerSize = 6
